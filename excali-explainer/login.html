<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Java Mastery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fdfcf9; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; margin: 0; }
        .auth-container { width: 100%; max-width: 400px; padding: 2.5rem; background: var(--bg-color); box-sizing: border-box; }
        .input-field { width: 100%; padding: 0.8rem; margin: 0.8rem 0; font-family: 'Kalam', cursive; font-size: 1.1rem; box-sizing: border-box; outline: none; }
        .auth-btn { width: 100%; margin-top: 1rem; text-align: center; font-size: 1.2rem; cursor: pointer; padding: 0.8rem; }
        .auth-links { margin-top: 1.5rem; text-align: center; font-size: 1rem; }
        .auth-links a { color: #2980b9; text-decoration: none; font-weight: bold; }
        .auth-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div style="position: absolute; top: 20px; left: 20px;">
        <a href="index.html" class="nav-btn sketchy-border" style="text-decoration:none;">⬅ Back to Home</a>
    </div>

    <div class="auth-container sketchy-border visual-box">
        <h2 class="hatched-orange-small" style="text-align:center; padding:0.5rem; margin-bottom:1.5rem;">Welcome Back!</h2>
        <form id="loginForm">
            <input type="email" id="email" class="input-field sketchy-border" placeholder="Email Address" required>
            
            <div style="position:relative;">
                <input type="password" id="password" class="input-field sketchy-border" placeholder="Password" required>
                <span id="togglePassword" style="position:absolute; right:15px; top:22px; cursor:pointer; font-size: 1.2rem;">👁️</span>
            </div>

            <button type="submit" class="copy-btn sketchy-border auth-btn" style="background:#2ecc71; color:white; display:block;">Login</button>
            <div id="error-msg" style="color:#e74c3c; text-align:center; margin-top:10px; display:none; font-weight:bold;"></div>
        </form>

        <div class="auth-links">
            <p>Don't have an account? <a href="signup.html">Sign up</a></p>
            <p><a href="forgot.html" style="color: #e74c3c;">Forgot Password?</a></p>
        </div>
    </div>

    <script>
        document.getElementById('togglePassword').addEventListener('click', function () {
            const password = document.getElementById('password');
            if (password.type === 'password') {
                password.type = 'text';
                this.textContent = '🙈';
            } else {
                password.type = 'password';
                this.textContent = '👁️';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.textContent = "Logging in...";
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if(res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userName', data.name);
                    localStorage.setItem('userEmail', data.email);
                    window.location.href = 'problems.html';
                } else {
                    document.getElementById('error-msg').textContent = data.error || 'Login failed';
                    document.getElementById('error-msg').style.display = 'block';
                    btn.textContent = "Login";
                }
            } catch(err) {
                document.getElementById('error-msg').textContent = "Server error or not connected to DB.";
                document.getElementById('error-msg').style.display = 'block';
                btn.textContent = "Login";
            }
        });
    </script>
</body>
</html>
