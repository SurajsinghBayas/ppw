<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Assignments - Visualized</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Mermaid JS for Visual Flowcharts -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
</head>
<body>
    <div class="board">
        <div class="title-banner hatched-red sketchy-border">
            <h1>JAVA LOGIC VISUALIZED</h1>
        </div>

        <div class="search-container sketchy-border">
            <input type="text" id="search-bar" placeholder="🔍 Search problems, concepts (e.g. 'palindrome', 'switch')...">
        </div>

        <div class="day-section">
            <div class="section-title hatched-red-small sketchy-border">
                <h2>Day 1: Basics</h2>
            </div>
            <div class="canvas-grid" id="day1-grid"></div>
        </div>

        <div class="day-section">
            <div class="section-title hatched-orange-small sketchy-border">
                <h2>Day 2: Control Flow & Logic</h2>
            </div>
            <div class="canvas-grid" id="day2-grid"></div>
        </div>
    </div>
    
    <div class="arrow" style="top: 15%; left: 10%; transform: rotate(45deg);"></div>
    <div class="arrow" style="top: 50%; right: 5%; transform: rotate(-135deg);"></div>

    <!-- Modal Background -->
    <div id="modal-overlay" class="modal-overlay">
        <!-- Modal Content Box -->
        <div id="modal-content" class="modal-content sketchy-border">
            <span id="close-modal" class="close-btn">&times;</span>
            <h2 id="modal-title" class="modal-title hatched-red-small"></h2>
            
            <div id="modal-body">
                <div class="visual-section">
                    <h3>🎨 Visual Data Flow</h3>
                    <!-- Mermaid diagram will be injected here -->
                    <div id="modal-flowchart" class="mermaid-container sketchy-border"></div>
                </div>
                
                <div class="explanation-grid">
                    <div class="explanation-section">
                        <h3>💡 Core Concept</h3>
                        <p id="modal-concept"></p>
                    </div>
                    
                    <div class="explanation-section">
                        <h3>🧠 Deep Dive</h3>
                        <p id="modal-pro"></p>
                    </div>
                </div>
                
                <div class="explanation-section file-tag">
                    <h3>💻 Code Path</h3>
                    <a id="modal-file" class="code-path sketchy-border" target="_blank" rel="noopener noreferrer"></a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
